<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Книга "Новая версия" | Андрей Дороничев</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f7; /* Матовый белый/серый как на обложке */
            --text-color: #111111;
            --accent-color: #39ff14; /* Неоновый зеленый акцент */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            display: flex;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            display: flex;
            align-items: center;
            gap: 5rem;
        }

        .content {
            flex: 1;
            max-width: 600px;
        }

        .cover {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .cover img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border-radius: 4px;
            transition: transform 0.3s ease;
        }

        .cover img:hover {
            transform: translateY(-10px);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.95;
            margin-bottom: 1.5rem;
            letter-spacing: -0.03em;
        }

        .subtitle {
            font-size: 1.25rem;
            font-weight: 400;
            color: #555;
            margin-bottom: 3rem;
            max-width: 80%;
        }

        .form-wrapper {
            background: #fff;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .form-wrapper h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .form-wrapper p {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 2rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: var(--text-color);
        }

        button {
            background-color: var(--text-color);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            padding: 1rem 2rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background-color: var(--accent-color);
            color: var(--text-color);
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
        }

        #success-msg {
            display: none;
            color: #10b981;
            font-weight: bold;
            margin-top: 1rem;
        }

        /* Адаптив для мобилок */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                text-align: center;
                gap: 3rem;
                padding: 2rem 1rem;
            }

            .subtitle {
                max-width: 100%;
                margin: 0 auto 2rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .form-wrapper {
                text-align: left;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="content">
            <h1>Новая <br>Версия<span class="dot"></span></h1>
            <p class="subtitle">Книга Андрея Дороничева. Перепридумай себя методами Кремниевой долины.</p>
            
            <div class="form-wrapper">
                <h3>Оформить предзаказ</h3>
                <p>Оставьте свой email, чтобы первыми получить доступ к предзаказу и эксклюзивную главу до официального релиза.</p>
                
                <form id="preorder-form" action="https://script.google.com/macros/s/AKfycbzgslpdnMsdI7tNb1qaKYqU_l2j7xre-MgZCNaA6Pf7-FzIuR6V41FN_kSwtIsPQRn0Qg/exec" method="POST">
                    <input type="text" name="name" placeholder="Ваше имя" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <button type="submit">Жду книгу</button>
                    <div id="success-msg">Спасибо! Вы в списке. Мы скоро свяжемся с вами.</div>
                </form>
            </div>
        </div>

        <div class="cover">
            <img src="book_cover.png" alt="Обложка книги: Новая версия">
        </div>
    </div>

    <script>
        // Скрипт для отправки формы без перезагрузки страницы
        const form = document.getElementById('preorder-form');
        const successMsg = document.getElementById('success-msg');
        const btn = form.querySelector('button');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.textContent = 'Отправка...';
            btn.style.opacity = '0.7';

            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
            }).then(
                response => {
                    form.reset();
                    btn.style.display = 'none';
                    form.querySelectorAll('input').forEach(input => input.style.display = 'none');
                    successMsg.style.display = 'block';
                }
            ).catch(error => {
                btn.textContent = 'Ошибка. Попробуйте еще раз';
                btn.style.opacity = '1';
                console.error('Error!', error.message);
            });
        });
    </script>
</body>
</html>
